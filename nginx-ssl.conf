# HTTP - redirect to HTTPS and handle ACME challenges
server {
    listen 80;
    server_name compassionbenchmark.com www.compassionbenchmark.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://compassionbenchmark.com$request_uri;
    }
}

# Redirect www to non-www
server {
    listen 443 ssl;
    server_name www.compassionbenchmark.com;

    ssl_certificate /etc/letsencrypt/live/compassionbenchmark.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compassionbenchmark.com/privkey.pem;

    return 301 https://compassionbenchmark.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name compassionbenchmark.com;
    root /usr/share/nginx/html;
    index home.html;

    # SSL
    ssl_certificate /etc/letsencrypt/live/compassionbenchmark.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compassionbenchmark.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 256;

    # Root serves home.html
    location = / {
        try_files /home.html =404;
    }

    # Handle requests with or without .html extension
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Rewrite mismatched link targets to actual filenames
    rewrite ^/us-states-index\.html$ /us-states.html permanent;
    rewrite ^/data-license\.html$ /data-licenses.html permanent;
    rewrite ^/humanoid-robotics-labs\.html$ /top-50-robotics-companies.html permanent;
    rewrite ^/ai-labs\.html$ /top-50-ai-labs.html permanent;
    rewrite ^/cities-index\.html$ /top-250-global-cities.html permanent;

    # Clean URL support
    rewrite ^/us-states-index$ /us-states.html permanent;
    rewrite ^/data-license$ /data-licenses.html permanent;
    rewrite ^/humanoid-robotics-labs$ /top-50-robotics-companies.html permanent;
    rewrite ^/ai-labs$ /top-50-ai-labs.html permanent;

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
