# HTTP - redirect to HTTPS and handle ACME challenges
server {
    listen 80;
    server_name compassionbenchmark.com www.compassionbenchmark.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://compassionbenchmark.com$request_uri;
    }
}

# Redirect www to non-www
server {
    listen 443 ssl;
    server_name www.compassionbenchmark.com;

    ssl_certificate /etc/letsencrypt/live/compassionbenchmark.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compassionbenchmark.com/privkey.pem;

    return 301 https://compassionbenchmark.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name compassionbenchmark.com;
    root /usr/share/nginx/html;
    index index.html;

    # SSL
    ssl_certificate /etc/letsencrypt/live/compassionbenchmark.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compassionbenchmark.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/html;
    gzip_min_length 256;

    # ── Umami analytics reverse proxy ──────────────────────────
    # Proxies /u/ → Umami container so the tracking script loads
    # over HTTPS from the same domain (no mixed-content issues).
    # The script tag uses:  src="/u/script.js"
    # Umami API calls use:  /u/api/send
    location /u/ {
        proxy_pass http://umami:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static export: folder-based routes with index.html
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Legacy URL redirects
    rewrite ^/home\.html?$ / permanent;
    rewrite ^/home$ / permanent;
    rewrite ^/countries-index\.html?$ /countries permanent;
    rewrite ^/countries-index$ /countries permanent;
    rewrite ^/us-states-index\.html?$ /us-states permanent;
    rewrite ^/us-states-index$ /us-states permanent;
    rewrite ^/data-license\.html?$ /data-licenses permanent;
    rewrite ^/data-license$ /data-licenses permanent;
    rewrite ^/humanoid-robotics-labs\.html?$ /robotics-labs permanent;
    rewrite ^/humanoid-robotics-labs$ /robotics-labs permanent;
    rewrite ^/ai-labs\.html?$ /ai-labs permanent;
    rewrite ^/top-50-ai-labs\.html?$ /ai-labs permanent;
    rewrite ^/top-50-robotics-companies\.html?$ /robotics-labs permanent;
    rewrite ^/top-150-us-cities\.html?$ /us-cities permanent;
    rewrite ^/top-250-global-cities\.html?$ /global-cities permanent;
    rewrite ^/cities-index\.html?$ /global-cities permanent;

    # Strip .html extension
    rewrite ^/(.+)\.html$ /$1 permanent;

    # Cache Next.js hashed static assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
