<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    Ascending Band Arc favicon — 32×32 viewBox.
    Favicon reduction: 3 segments (Critical, Functional, Exemplary), no gaps.
    Segments meet end-to-end so the arc reads as solid at 16px.
    Thicker stroke (6) for legibility at 16px.
    Fixed hex colors (currentColor does not resolve in static SVG favicons).

    Geometry: cx=16, cy=18.667, r=12
    Total sweep 150° from 210° (lower-left) to 60° (upper-right).
    3 segments × 50° each, no gaps (segments share endpoints).
    Arc direction: sweep-flag=0 (CCW in SVG screen = ascending visually).
  -->

  <!-- Segment 0: Critical #f87171 — 210° to 160° -->
  <path d="M5.608,24.667 A12,12 0 0 0 4.724,14.563"
        stroke="#f87171" stroke-width="6" stroke-linecap="round"/>

  <!-- Segment 1: Functional #fcd34d — 160° to 110° -->
  <path d="M4.724,14.563 A12,12 0 0 0 11.896,7.391"
        stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>

  <!-- Segment 2: Exemplary #7dd3fc — 110° to 60° -->
  <path d="M11.896,7.391 A12,12 0 0 0 22.000,8.275"
        stroke="#7dd3fc" stroke-width="6" stroke-linecap="round"/>
</svg>
