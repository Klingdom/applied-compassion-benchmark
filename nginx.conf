server {
    listen 80;
    server_name compassionbenchmark.com www.compassionbenchmark.com;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/html;
    gzip_min_length 256;

    # Next.js static export: folder-based routes with index.html
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Legacy URL redirects (from old .html paths)
    rewrite ^/home\.html?$ / permanent;
    rewrite ^/home$ / permanent;
    rewrite ^/countries-index\.html?$ /countries permanent;
    rewrite ^/countries-index$ /countries permanent;
    rewrite ^/us-states-index\.html?$ /us-states permanent;
    rewrite ^/us-states-index$ /us-states permanent;
    rewrite ^/data-license\.html?$ /data-licenses permanent;
    rewrite ^/data-license$ /data-licenses permanent;
    rewrite ^/humanoid-robotics-labs\.html?$ /robotics-labs permanent;
    rewrite ^/humanoid-robotics-labs$ /robotics-labs permanent;
    rewrite ^/ai-labs\.html?$ /ai-labs permanent;
    rewrite ^/top-50-ai-labs\.html?$ /ai-labs permanent;
    rewrite ^/top-50-robotics-companies\.html?$ /robotics-labs permanent;
    rewrite ^/top-150-us-cities\.html?$ /us-cities permanent;
    rewrite ^/top-250-global-cities\.html?$ /global-cities permanent;
    rewrite ^/cities-index\.html?$ /global-cities permanent;

    # Strip .html extension from any direct .html request
    rewrite ^/(.+)\.html$ /$1 permanent;

    # Cache Next.js hashed static assets aggressively
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Custom error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
